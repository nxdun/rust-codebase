name: nadzu
services:
  warp:
    image: nxdun/cloudflare-warp-proxy:latest
    restart: unless-stopped
    environment:
      LICENSE: "${WARP_LICENSE_KEY}"

  app:
    image: ${IMAGE:-nadzu}:${TAG:-local}
    depends_on:
      - warp
    environment:
      APP_PORT: "${APP_PORT}"
      APP_ENV: "${APP_ENV}"
      APP_NAME: "${APP_NAME}"
      ALLOWED_ORIGINS: "${ALLOWED_ORIGINS}"
      MAX_CONCURRENT_DOWNLOADS: "${MAX_CONCURRENT_DOWNLOADS}"
      CAPTCHA_SECRET_KEY: "${CAPTCHA_SECRET_KEY}"

      HTTP_PROXY: "socks5h://warp:40000"
      HTTPS_PROXY: "socks5h://warp:40000"
      ALL_PROXY: "socks5h://warp:40000"
    volumes:
      - ${YTDLP_COOKIES_FILE}:/run/secrets/ytdlp-cookies.txt:ro
    ports:
      - "80:8080"

