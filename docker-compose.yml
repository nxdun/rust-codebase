
# Production docker-compose file: refer to infra/common/cloud-init.template

name: nadzu
services:
  warp:
    image: nxdun/cloudflare-warp-proxy:latest
    restart: unless-stopped

    # ADD NET_ADMIN capability and mount /dev/net/tun for WireGuard support

    # cap_add:
    #   - NET_ADMIN
    # devices:
    #   - /dev/net/tun:/dev/net/tun

  app:
    image: ${GHCR_IMAGE}
    restart: unless-stopped
    depends_on:
      - warp
    volumes:
      - "./production/downloads:/home/app/downloads"
    env_file:
      - .env
    environment:
      - HTTP_PROXY=socks5h://warp:40000
      - HTTPS_PROXY=socks5h://warp:40000
      - ALL_PROXY=socks5h://warp:40000
      - NO_PROXY=localhost,127.0.0.1,app,warp,caddy,prometheus,grafana

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - Caddyfile:/etc/caddy/Caddyfile:ro
      - ./infra/common/certs:/etc/caddy/certs:ro
      - ./infra/common/browse.html:/etc/caddy/browse.html:ro
      - "./production/downloads:/home/app/downloads:ro"
    depends_on:
      - app

  prometheus:
    image: prom/prometheus:latest
    restart: unless-stopped
    volumes:
      - <prometheus.yml-path>:/etc/prometheus/prometheus.yml

  grafana:
    image: grafana/grafana:latest
    restart: unless-stopped
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Viewer
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_SERVE_FROM_SUB_PATH=true
      - GF_SERVER_ROOT_URL=https://${PRODUCTION_DOMAIN}/nadun/grafana/
      - GF_ANALYTICS_REPORTING_ENABLED=false
      - GF_ANALYTICS_CHECK_FOR_UPDATES=false
      - GF_DASHBOARDS_NEWS_FEED_ENABLED=false
    volumes:
      - <grafana-provisioning-folder>:/etc/grafana/provisioning
    depends_on:
      - prometheus
  
