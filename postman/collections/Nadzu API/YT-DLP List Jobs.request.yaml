$kind: http-request
name: YT-DLP List Jobs
url: "{{base_url}}/api/v1/ytdlp/jobs"
method: GET
headers:
  x-api-key: dev_master_key_change_me
scripts:
  - type: afterResponse
    code: >-
      pm.test('Status is 200', function () { pm.response.to.have.status(200);
      });

      pm.test('Response has jobs array', function () {
        var jsonData = pm.response.json();
        pm.expect(jsonData).to.have.property('jobs');
        pm.expect(jsonData.jobs).to.be.an('array');
      });
    language: text/javascript
order: 7000
