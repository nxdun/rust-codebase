$kind: http-request
name: Malee Chat
url: "{{base_url}}/api/v1/malee/chat"
method: POST
headers:
  - key: x-api-key
    value: "{{api_key}}"
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "message": "I want to buy a gift for my mother. She likes lilies. My budget is around 5000 LKR.",
      "session_id": null,
      "language_mode": "auto"
    }
scripts:
  - type: afterResponse
    code: |-
      pm.test('Status is 200', function () { 
        pm.response.to.have.status(200);
      });

      pm.test('Content-Type is text/event-stream', function () {
        pm.expect(pm.response.headers.get('Content-Type')).to.contain('text/event-stream');
      });
    language: text/javascript
order: 3000