$kind: http-request
name: Malee Add To Cart
url: "{{base_url}}/api/v1/malee/action"
method: POST
headers:
  - key: x-api-key
    value: "{{api_key}}"
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "session_id": "{{malee_session_id}}",
      "action": "add_to_cart",
      "payload": {
        "product_id": "cake00ka002034",
        "quantity": 1,
        "icing_text": "Happy Birthday!"
      }
    }
scripts:
  - type: afterResponse
    code: |-
      pm.test('Status is 200', function () { 
        pm.response.to.have.status(200);
      });
    language: text/javascript
order: 3007
