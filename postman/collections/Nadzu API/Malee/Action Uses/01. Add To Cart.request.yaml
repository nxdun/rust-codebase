$kind: http-request
name: 01. Add To Cart
url: "{{base_url}}/api/v1/malee/action"
method: POST
headers:
  - key: x-api-key
    value: "{{api_key}}"
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "session_id": "{{malee_session_id}}",
      "action": "add_to_cart",
      "payload": {
        "product_id": "cake00ka002034",
        "name": "Kit Kat Silk Roses Bouquet",
        "price_lkr": 5900,
        "quantity": 1,
        "image_url": "https://example.com/image.jpg",
        "is_perishable": true
      }
    }
scripts:
  - type: afterResponse
    code: |-
      pm.test('Status is 200', function () { 
        pm.response.to.have.status(200);
      });
      pm.test('Cart has item', function () {
        var jsonData = pm.response.json();
        pm.expect(jsonData.cart).to.not.be.undefined;
        pm.expect(jsonData.cart.items).to.be.an('array');
        pm.expect(jsonData.cart.item_count).to.be.above(0);
      });
    language: text/javascript
order: 1
