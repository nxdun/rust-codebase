$kind: http-request
name: YT-DLP Enqueue (shorts URL)
url: "{{base_url}}/api/v1/ytdlp"
method: POST
headers:
  - key: Content-Type
    value: application/json
  - key: x-captcha-token
    value: "{{captcha_token}}"
    disabled: true
  - key: x-bypass-dev
    value: "true"
body:
  type: text
  content: |-
    {
      "url": "https://youtube.com/shorts/5g4pLlLH6P4?si=jaO5XHPymDBSc5uL",
      "quality": "best",
      "format": "mp4"
    }
scripts:
  - type: afterResponse
    code: >-
      pm.test('Status is 202', function () { pm.response.to.have.status(202);
      });

      var jsonData = pm.response.json();

      pm.test('Shorts URL normalized to watch URL', function () {
        pm.expect(jsonData.job.url).to.include('https://www.youtube.com/watch?v=');
      });

      pm.collectionVariables.set('latest_job_id', jsonData.job.id);
    language: text/javascript
order: 5000
