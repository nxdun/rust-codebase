$kind: http-request
name: supported sites
url: "{{base_url}}/api/v1/ytdlp/sites"
method: GET
headers:
  x-bypass-dev: "true"
scripts:
  - type: afterResponse
    code: >-
      pm.test('Status is 200', function () { pm.response.to.have.status(200);
      });

      pm.test('Response has sites array', function () {
        var jsonData = pm.response.json();
        pm.expect(jsonData).to.have.property('sites');
        pm.expect(jsonData.sites).to.be.an('array');
      });
    language: text/javascript
order: 6935
