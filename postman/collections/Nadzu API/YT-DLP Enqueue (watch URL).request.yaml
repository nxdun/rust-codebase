$kind: http-request
url: "{{base_url}}/api/v1/ytdlp"
method: POST
headers:
  Content-Type: application/json
  x-captcha-token: "{{captcha_token}}"
body:
  type: text
  content: |-
    {
      "url": "https://www.youtube.com/watch?v=dQw4w9WgXcQ",
      "quality": "best",
      "format": "mp4"
    }
scripts:
  - type: afterResponse
    code: >-
      pm.test('Status is 202', function () { pm.response.to.have.status(202);
      });

      var jsonData = pm.response.json();

      pm.test('Response has job id', function () {
        pm.expect(jsonData).to.have.property('job');
        pm.expect(jsonData.job).to.have.property('id');
      });

      pm.collectionVariables.set('latest_job_id', jsonData.job.id);
    language: text/javascript
order: 4000
