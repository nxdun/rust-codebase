$kind: http-request
name: YT-DLP Enqueue
url: "{{base_url}}/api/v1/ytdlp"
method: POST
headers:
  - key: Content-Type
    value: application/json
  - key: x-captcha-token
    value: "{{captcha_token}}"
    disabled: true
  - key: x-bypass-dev
    value: "true"
body:
  type: text
  content: |-
    {
      "url": "{{url}}",
      "quality": "best",
      "format": "mp4"
    }
scripts:
  - type: afterResponse
    code: >-
      pm.test('Status is 202', function () { pm.response.to.have.status(202);
      });

      var jsonData = pm.response.json();

      pm.test('Response has job id', function () {
        pm.expect(jsonData).to.have.property('job');
        pm.expect(jsonData.job).to.have.property('id');
      });

      pm.collectionVariables.set('latest_job_id', jsonData.job.id);
    language: text/javascript
order: 4000
