$kind: http-request
url: "{{base_url}}/api/v1/ytdlp/jobs/{{latest_job_id}}/stream"
method: GET
headers:
  Accept: text/event-stream
  x-bypass-dev: "true"
scripts:
  - type: afterResponse
    code: >-
      pm.test('Status is 200', function () { pm.response.to.have.status(200);
      });

      pm.test('Content-Type is text/event-stream', function () {
        pm.expect(pm.response.headers.get('Content-Type')).to.include('text/event-stream');
      });
    language: text/javascript
examples: .resources/YT-DLP Stream Job Progress.resources/examples
order: 8100
