name: Build and Publish GHCR Image

on:
  push:
    branches:
      - main
      - nadun/devops/core-infra
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/nadzu

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute short SHA tag
        id: vars
        env:
          TAG: ${{ github.sha }}
        run: echo "short_tag=${TAG::12}" >> "$GITHUB_OUTPUT"

      - name: Build and push linux/amd64 image
        run: |
          make dbuild-prod \
            IMAGE="${IMAGE_NAME}" \
            TAG="${{ steps.vars.outputs.short_tag }}" \
            PLATFORMS="linux/amd64" \
            PUSH=true

      - name: Wait for SHA tag in GHCR
        run: |
          IMAGE_REF="${IMAGE_NAME}:${{ steps.vars.outputs.short_tag }}"
          for i in {1..20}; do
            if docker buildx imagetools inspect "${IMAGE_REF}" >/dev/null 2>&1; then
              echo "Found ${IMAGE_REF}"
              exit 0
            fi
            echo "Waiting for ${IMAGE_REF} to become visible in GHCR... (${i}/20)"
            sleep 10
          done
          echo "Tag not visible in GHCR yet: ${IMAGE_REF}" >&2
          exit 1

      - name: Promote SHA tag to latest
        run: |
          docker buildx imagetools create \
            --tag "${IMAGE_NAME}:latest" \
            "${IMAGE_NAME}:${{ steps.vars.outputs.short_tag }}"
