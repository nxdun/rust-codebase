name: Build and Publish GHCR Image

on:
  push:
    branches:
      - main
      - nadun/devops/core-infra
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/nadzu

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push compressed multi-arch image
        env:
          TAG: ${{ github.sha }}
        run: |
          SHORT_TAG="${TAG::12}"
          make dbuild-prod IMAGE="${IMAGE_NAME}" TAG="${SHORT_TAG}" PUSH=true

      - name: Promote sha tag to latest
        env:
          TAG: ${{ github.sha }}
        run: |
          SHORT_TAG="${TAG::12}"
          docker buildx imagetools create \
            --tag "${IMAGE_NAME}:latest" \
            "${IMAGE_NAME}:${SHORT_TAG}"
