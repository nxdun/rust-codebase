name: Build and Publish GHCR Image

on:
  push:
    branches: [ devops/* ]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/nadzu
  
jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.0.0

      - name: Cache Docker mounts
        uses: actions/cache@v5.0.3
        with:
          path: |
            app-target
            cargo-registry
            cargo-git
          key: buildkit-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            buildkit-${{ runner.os }}-

      - name: Inject BuildKit cache
        uses: reproducible-containers/buildkit-cache-dance@v3.1.0
        with:
          cache-map: |
            {
              "app-target": "/app/target",
              "cargo-registry": "/usr/local/cargo/registry",
              "cargo-git": "/usr/local/cargo/git"
            }
          skip-extraction: ${{ github.event_name == 'pull_request' }}

      - name: Log in to GHCR
        uses: docker/login-action@v4.0.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Get short SHA for tagging
        id: vars
        run: echo "short_tag=${GITHUB_SHA::8}" >> "$GITHUB_OUTPUT"

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          platforms: linux/amd64
          build-args: |
            MODE=release
            BIN=nadzu
          tags: |
            ${{ env.IMAGE_NAME }}:${{ steps.vars.outputs.short_tag }}
            ${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
