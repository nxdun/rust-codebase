name: Build and Publish GHCR Image

on:
  push:
    branches:
      - main
      - nadun/devops/core-infra
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/nadzu

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            arch: amd64
          - os: ubuntu-24.04-arm
            arch: arm64
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute short SHA tag
        id: vars
        env:
          TAG: ${{ github.sha }}
        run: echo "short_tag=${TAG::12}" >> "$GITHUB_OUTPUT"

      - name: Build and push architecture-specific image
        run: |
          make dbuild-prod \
            IMAGE="${IMAGE_NAME}" \
            TAG="${{ steps.vars.outputs.short_tag }}-${{ matrix.arch }}" \
            PLATFORMS="linux/${{ matrix.arch }}" \
            PUSH=true

  manifest:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute short SHA tag
        id: vars
        env:
          TAG: ${{ github.sha }}
        run: echo "short_tag=${TAG::12}" >> "$GITHUB_OUTPUT"

      - name: Combine images into multi-arch manifest
        run: |
          docker buildx imagetools create \
            --tag "${IMAGE_NAME}:${{ steps.vars.outputs.short_tag }}" \
            --tag "${IMAGE_NAME}:latest" \
            "${IMAGE_NAME}:${{ steps.vars.outputs.short_tag }}-amd64" \
            "${IMAGE_NAME}:${{ steps.vars.outputs.short_tag }}-arm64"
